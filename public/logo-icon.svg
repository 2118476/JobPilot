<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <style>
    .compass-ring { stroke: currentColor; stroke-width: 2.5; fill: none; }
    .compass-needle { stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; }
    .pilot-hat { stroke: currentColor; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .detail { stroke: currentColor; stroke-width: 2; stroke-linecap: round; }
  </style>
  <!-- Outer compass ring -->
  <circle class="compass-ring" cx="32" cy="32" r="26"/>
  <!-- Inner compass ring -->
  <circle class="compass-ring" cx="32" cy="32" r="20" style="stroke-width:1.5;opacity:0.5"/>
  <!-- Compass needle (diamond shape) -->
  <line class="compass-needle" x1="32" y1="14" x2="32" y2="50"/>
  <line class="compass-needle" x1="14" y1="32" x2="50" y2="32"/>
  <!-- Pilot hat brim (arc across top) -->
  <path class="pilot-hat" d="M18 22 Q32 8 46 22" style="stroke-width:2"/>
  <!-- Center hub -->
  <circle cx="32" cy="32" r="4" fill="currentColor"/>
  <!-- Cardinal marks -->
  <line class="detail" x1="32" y1="6" x2="32" y2="10"/>
  <line class="detail" x1="32" y1="54" x2="32" y2="58"/>
  <line class="detail" x1="6" y1="32" x2="10" y2="32"/>
  <line class="detail" x1="54" y1="32" x2="58" y2="32"/>
</svg>
