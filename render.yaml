services:
  - type: web
    name: jobpilot-backend
    env: docker  # add the suggested Dockerfile first
    dockerfilePath: Dockerfile
    healthCheckPath: <your health endpoint, e.g. /api/health>
    envVars:
      - key: AI_PROVIDER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: OLLAMA_MODEL
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: REED_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ENABLE_SCHEDULER
        sync: false
      - key: SCHEDULE_TIMES
        sync: false
      - key: DEADLINE_DIGEST_TIME
        sync: false
      - key: RATE_LIMIT_MAX
        sync: false
      - key: RATE_LIMIT_AI_MAX
        sync: false
      - key: ALLOW_MOCK_AUTH
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
