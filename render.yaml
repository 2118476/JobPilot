# Render blueprint for the JobPilot backend API (Node/Express in Docker).
# In Render: New → Blueprint → connect this repo → it reads this file.
# Then set the secret env vars (marked sync:false) in the dashboard.
# Existing services must receive sync:false values in the Environment tab.
services:
  - type: web
    name: jobpilot-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_SCORE_MODEL
        value: gemini-2.5-flash-lite
      - key: NODE_ENV
        value: production
      # Comma-separated list of allowed browser origins (your Netlify URL).
      - key: ALLOWED_ORIGINS
        sync: false
      # ── Secrets — set these in the Render dashboard (never commit them) ──
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # ── Optional ──
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: REED_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_TO
        sync: false
